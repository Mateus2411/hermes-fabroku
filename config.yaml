model:
  default: deepseek/deepseek-chat
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  context_length: 128000

agent:
  max_turns: 50
  tool_use_enforcement: false

terminal:
  timeout: 60

display:
  skin: default
  show_reasoning: false
  show_cost: false

security:
  tirith_enabled: false
  redact_secrets: false
