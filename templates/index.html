<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes - DeepSeek Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13;
    --surface: #1a1a23;
    --surface2: #24243a;
    --border: #2a2a3e;
    --text: #e4e4ec;
    --text2: #8888a0;
    --accent: #b388ff;
    --accent2: #7c4dff;
    --user-bg: #2a2a45;
    --bot-bg: #1e1e30;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--font); font-size: 15px; line-height: 1.6;
  }
  .app {
    display: flex; flex-direction: column; height: 100%; max-width: 800px;
    margin: 0 auto; padding: 0 16px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 18px; font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  header .status { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  header .status .dot {
    width: 8px; height: 8px; border-radius: 50%; background: #4caf50;
    display: inline-block; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  #chat {
    flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column;
    gap: 12px; scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .msg {
    display: flex; flex-direction: column; max-width: 85%;
    animation: fadeIn 0.2s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; }
  .msg.bot { align-self: flex-start; }
  .msg .bubble {
    padding: 12px 16px; border-radius: 16px; font-size: 14px;
    word-wrap: break-word; white-space: pre-wrap;
  }
  .msg.user .bubble {
    background: var(--user-bg); border-bottom-right-radius: 4px;
    border: 1px solid var(--border);
  }
  .msg.bot .bubble {
    background: var(--bot-bg); border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }
  .msg .label { font-size: 11px; color: var(--text2); padding: 0 4px 4px; }
  .msg.user .label { text-align: right; }
  .typing {
    align-self: flex-start; display: flex; gap: 4px; padding: 16px;
    align-items: center;
  }
  .typing span {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    animation: bounce 1.4s infinite ease-in-out both;
  }
  .typing span:nth-child(1) { animation-delay: -0.32s; }
  .typing span:nth-child(2) { animation-delay: -0.16s; }
  .typing span:nth-child(3) { animation-delay: 0s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
  .input-area {
    display: flex; gap: 8px; padding: 16px 0; border-top: 1px solid var(--border);
  }
  .input-area textarea {
    flex: 1; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px; font-family: var(--font); font-size: 14px;
    resize: none; outline: none; transition: border-color 0.2s;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area button {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border: none; border-radius: 12px; padding: 0 20px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .input-area button:active { transform: scale(0.96); }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: var(--text2); gap: 12px;
  }
  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .error-msg { background: #3a1a1a; border: 1px solid #5a2a2a; color: #ff8a8a;
    padding: 8px 12px; border-radius: 8px; font-size: 13px; margin-top: 8px; }
  .actions { display: flex; gap: 8px; }
  .actions button {
    background: transparent; border: 1px solid var(--border); color: var(--text2);
    border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer;
    transition: all 0.15s;
  }
  .actions button:hover { border-color: var(--accent); color: var(--accent); }
  @media (max-width: 600px) {
    .app { padding: 0 8px; }
    .msg { max-width: 92%; }
  }
  code {
    background: #1a1a2a; padding: 2px 6px; border-radius: 4px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px;
  }
  pre {
    background: #0a0a14; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; overflow-x: auto; margin: 8px 0;
  }
  pre code { background: none; padding: 0; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>✦ Hermes · DeepSeek</h1>
    <div class="status">
      <span class="dot"></span> <span id="modelLabel">Carregando...</span>
    </div>
  </header>

  <div id="chat">
    <div class="empty-state" id="emptyState">
      <div class="icon">✦</div>
      <div>Converse com Hermes via DeepSeek</div>
      <div style="font-size:13px">Mande uma mensagem pra começar</div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Mensagem..." autofocus></textarea>
    <button id="sendBtn" onclick="send()">→</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const emptyState = document.getElementById('emptyState');
const modelLabel = document.getElementById('modelLabel');

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

let loading = false;

function addMessage(text, role) {
  emptyState?.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'Você' : 'Hermes';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(label);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  document.getElementById('typing')?.remove();
}

function showError(msg) {
  const div = document.createElement('div');
  div.className = 'error-msg';
  div.textContent = '⚠ ' + msg;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text || loading) return;

  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  loading = true;
  sendBtn.disabled = true;
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    hideTyping();

    if (data.error) {
      showError(data.error);
    } else {
      addMessage(data.response, 'bot');
    }

    if (data.session_id) {
      modelLabel.textContent = 'Sessão ativa';
    }
  } catch (err) {
    hideTyping();
    showError('Erro de conexão: ' + err.message);
  } finally {
    loading = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

async function resetChat() {
  try {
    await fetch('/api/reset', { method: 'POST' });
    chat.innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="icon">✦</div>
        <div>Converse com Hermes via DeepSeek</div>
        <div style="font-size:13px">Mande uma mensagem pra começar</div>
      </div>`;
    modelLabel.textContent = 'Pronto';
  } catch {}
}

// Check health on load
fetch('/health').then(r => r.json()).then(d => {
  modelLabel.textContent = 'Online';
}).catch(() => {
  modelLabel.textContent = 'Offline';
});
</script>
</body>
</html>
